    #main-menu {
        position: absolute;
        width: 100%;
        text-align: center;
        margin: 0 auto;
        bottom: 20%;
        left: 56%;
        transform: translate(-50%, -50%);

        z-index: 100;
        display: flex;
        gap: 25px;
        padding: 15px 15px;
        padding-left: 8px;
        border-radius: 50px;
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.4s, visibility 0.4s;
    }

    #main-menu.visible {
        opacity: 1;
        visibility: visible;
    }
    #main-menu a {
        color: #ccc;
        text-decoration: none;
        font-family: 'Oswald';
        font-weight: bold;
        text-transform: uppercase;
        text-shadow: 0 0 5px #000;
        padding: 10px 0;
        position: relative;
        transition: color 0.3s;
    }
    #main-menu a:hover {
        color: #fff;
    }
    #main-menu a::after {
        content: '';
        position: absolute;
        bottom: 0;
        left: 0;
        width: 0;
        height: 2px;
        background: #e34f12;
        transition: width 0.3s ease-out;
    }
    #main-menu a:hover::after {
        width: 100%;
    }
    #main-menu.locked a {
        pointer-events: none;
        cursor: not-allowed;
        opacity: 0.5;
    }

    main {
        flex-grow: 1;
        display: grid;
        place-items: center;
        width: 100%;
        position: relative;
    }

    .slider-container {
        margin-top: 500px;
        width: 340px;
        height: 370px;
        perspective: 1950px;
        cursor: grab;
    }

    .slider-container:active {
        cursor: grabbing;
    }
    
    .slider {
        width: 100%;
        height: 100%;
        position: relative;
        transform-style: preserve-3d;
        transition: transform 1.7s cubic-bezier(0.25, 0.46, 0.45, 0.94), opacity 0.4s ease-out;
    }
    
    .slider.is-changing {
        opacity: 0;
        transform: perspective(1000px) rotateY(360deg) scale(0.5);
    }

    .slider span {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        transform-origin: center;
        transform-style: preserve-3d;
    }
    .slider span img {
        position: absolute;
        top: 0;
        left: -30px;
        width: 100%;
        height: 100%;
        border-radius: 10px;
        object-fit: cover;
        transition: transform 0.5s ease, border 0.5s ease;
        box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        -webkit-box-reflect: below 1px linear-gradient(transparent, transparent, #0002);
    }
    .slider span.active img {
        transform: scale(1.3) translateZ(-850px);
    }

    .floor-text-fixed {

        left: 50%;

        font-size: 120px;
        font-weight: bold;
        text-transform: uppercase;
        letter-spacing: 5px;
        color: #0747a1;
        text-shadow:

            0 0 10px #fff,
            0 0 20px #0747a1,
            0 0 30px #0747a1,

    }

        top: 1%;
        left: 50%;
        padding-left: 40px;
        transform: translateX(-50%);
        z-index: -1;

        font-size: 180px;
        font-weight: bold;
        text-transform: uppercase;
        letter-spacing: 5px;
        color: #0747a1;
        text-shadow:
            0 0 5px #fff,
            0 0 10px #fff,
            0 0 20px #0747a1,
            0 0 30px #0747a1,

    .floor-text-fixed.hidden {
        opacity: 0;
    }

    }
    .carousel-container {
        width: 100%;
        height: 100%;

        position: relative;

    }

    #modal-carousel-track {
        display: flex; 
        width: 100%;
        height: 100%;
        transition: transform 0.5s ease-in-out;
    }

    .carousel-slide {
        width: 100%;
        flex-shrink: 0;
        height: auto;
        object-fit: contain; 
    }

    .carousel-nav {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        background: rgba(0, 0, 0, 0.5);
        color: white;
        border: none;
        padding: 10px;
        cursor: pointer;
        z-index: 10;
        font-size: 1.5em;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        display: flex;
        justify-content: center;

    .prev-nav { left: 10px; }
    .next-nav { right: 10px; }

    .carousel-dots {
        text-align: center;

    .dot {

        background-color: #555;
        border-radius: 50%;

        let movedX = 0;
        const swipeThreshold = 50; 

        function lockNavigation(lock) {
            const controls = [prevButton, nextButton, menuButton, selectButton];
            const menuLinks = mainMenu.querySelectorAll('a');
            if (lock) {
                controls.forEach(btn => btn.classList.add('locked'));
                menuLinks.forEach(link => link.classList.add('locked'));
            } else {
                controls.forEach(btn => btn.classList.remove('locked'));
                menuLinks.forEach(link => link.classList.remove('locked'));
            }
        }

        function updateMenu() {
            mainMenu.innerHTML = '';
            
            const mainGallery = galleries.main;

            mainGallery.subgalleries.forEach(subId => {
                const subGallery = galleries[subId];
                if (subGallery) {
                    const link = document.createElement('a');
                    link.href = "#";
                    link.dataset.category = subId;
                    link.textContent = subGallery.title;
                    mainMenu.appendChild(link);
                }
            });
        }

        async function preloadImages(galleryId) {
            const gallery = galleries[galleryId];
            if (!gallery.items) return;

            const promises = [];
            const cacheBuster = `?v=${Date.now()}`;

            gallery.items.forEach(item => {
                const imageSrc = imagePath + item.img + cacheBuster;
                promises.push(new Promise((resolve) => {
                    const img = new Image();
                    img.onload = resolve;
                    img.onerror = resolve;
                    img.src = imageSrc;
                }));
            });
            return Promise.all(promises);
        }

        async function buildCarousel(galleryId) {
            if (isTransitioning || currentGalleryId === galleryId) return;
            isTransitioning = true;
            stopAutoplay();
            lockNavigation(true);

            const gallery = galleries[galleryId];
            const hasItems = gallery.items && gallery.items.length > 0;

            if (hasItems) {
                slider.classList.add('is-changing');
                floorText.classList.add('hidden');

                await preloadImages(galleryId);
                await new Promise(resolve => setTimeout(resolve, 600));

                currentGalleryId = galleryId;
                totalImages = gallery.items.length;
                distanceZ = gallery.distanceZ;
                anglePerSlide = 360 / totalImages;
                currentSlideIndex = 0;
                totalRotationAngle = 0;

                let sliderHTML = '';
                gallery.items.forEach((item, index) => {
                    const imageSrc = imagePath + item.img;
                    const rotationY = index * anglePerSlide;
                    sliderHTML += `<span style="transform: rotateY(${rotationY}deg) translateZ(${distanceZ}px);"><img src="${imageSrc}" alt="${item.title}" data-index="${index}"></span>`;
                });
                slider.innerHTML = sliderHTML;
                slides = document.querySelectorAll('.slider span');

                await new Promise(resolve => setTimeout(resolve, 50));
                slider.classList.remove('is-changing');
            } else {
                currentGalleryId = galleryId;
                slider.innerHTML = '';
            }

            floorText.textContent = gallery.title;
            floorText.classList.remove('hidden');

            updateCarousel();
            resetAutoplayTimer();
            isTransitioning = false;

            setTimeout(() => {
                lockNavigation(false);
            }, 8000);
        }

        function updateCarousel() {
            if (!slides || slides.length === 0) return;
            slider.style.transform = `perspective(1000px) rotateY(${totalRotationAngle}deg)`;

            const frontImageIndex = (currentSlideIndex + Math.floor(totalImages / 2)) % totalImages;
            slides.forEach((slide, index) => {
                slide.classList.toggle('active', index === frontImageIndex);
            });
        }

        function startAutoplay() {
            if (autoplayInterval || !slides || slides.length === 0) return;
            autoplayInterval = setInterval(() => {
                totalRotationAngle -= anglePerSlide;
                currentSlideIndex = (currentSlideIndex + 1) % totalImages;
                updateCarousel();
            }, autoplaySpeed);
        }

        function stopAutoplay() {
            clearInterval(autoplayInterval);
            autoplayInterval = null;
        }

        function resetAutoplayTimer() {
            stopAutoplay();
            clearTimeout(autoplayTimer);
            autoplayTimer = setTimeout(startAutoplay, inactivityTime);
        }

        function openModal(galleryId, itemIndex) {
        const item = galleries[galleryId]?.items?.[itemIndex];
        if (!item) return;

        const qrAreaContainer = document.querySelector('.modal-qr-area');
        const qrContainer = document.getElementById('modal-qr-container');
        const codeDisplay = document.getElementById('product-code-display');

        if (codeDisplay) {
            codeDisplay.textContent = item.productCode ? `Cod.: ${item.productCode}` : '';
        }

        if (qrAreaContainer) {
            qrAreaContainer.style.display = 'block';

            if (item.showQr === false || !item.qr) {
                qrAreaContainer.style.display = 'none';
                if (qrContainer) qrContainer.innerHTML = '';
            } else {
                const urlFinalParaQR = item.qr;
                
                console.log("URL que se convertirá en QR (URL base):", urlFinalParaQR);

                if (qrContainer) {
                    qrContainer.innerHTML = ''; 
                }

                if (qrContainer && typeof QRCode !== "undefined") {
                    new QRCode(qrContainer, {
                        text: urlFinalParaQR, 
                        width: 280, 
                        height: 280, 
                        colorDark : "#000000",
                        colorLight : "#ffffff",
                        correctLevel : QRCode.CorrectLevel.H 
                    });
                } else if (qrContainer) {
                    qrContainer.innerHTML = '<p style="color:#d9534f; font-size: 10px;">Error: QRCode.js no cargado.</p>';
                }
            }
        }

        const slidesData = item.carouselSlides || 
                            (item.carouselImages ? item.carouselImages.map(src => ({type: 'image', src: src})) : [{type: 'image', src: item.img}]);
        
        totalModalSlides = slidesData.length;
        currentModalSlide = 0;
        
        modalCarouselTrack = document.getElementById('modal-carousel-track');
        const dotsContainer = document.getElementById('carousel-dots');
        
        if (modalCarouselTrack && dotsContainer) {
            modalCarouselTrack.innerHTML = '';
            dotsContainer.innerHTML = '';
            
            slidesData.forEach((slide, index) => {
                let slideElement;
                const fullSrc = imagePath + slide.src; 
                
                if (slide.type === 'video') {
                    if (slide.src.includes('youtube.com') || slide.src.includes('youtu.be')) {
                        slideElement = document.createElement('iframe');
                        slideElement.src = slide.src;
                        slideElement.setAttribute('allow', 'accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture');
                        slideElement.setAttribute('allowfullscreen', 'true');
                        slideElement.frameBorder = "0"; 
                    } else {
                        slideElement = document.createElement('video');
                        slideElement.src = fullSrc;
                        slideElement.controls = true; 
                        slideElement.preload = 'metadata'; 
                    }
                } else {
                    slideElement = document.createElement('img');
                    slideElement.src = fullSrc;
                    slideElement.alt = `Imagen ${index + 1} del producto`;
                }
                
                slideElement.className = 'carousel-slide';
                modalCarouselTrack.appendChild(slideElement);
                
                const dot = document.createElement('span');
                dot.className = 'dot';
                dot.dataset.index = index;
                dot.addEventListener('click', () => moveToModalSlide(index));
                dotsContainer.appendChild(dot);
            });
        }

        document.getElementById('modal-title').textContent = item.title;
        document.getElementById('modal-description').textContent = item.description;

        const specsList = document.getElementById('modal-specs');
        specsList.innerHTML = '';
        
        const combinedSpecs = item.specs ? item.specs : [];
        if (item.mediciones_compatibles) {
            combinedSpecs.push(...item.mediciones_compatibles);
        }
        
        if (combinedSpecs.length > 0) {
            combinedSpecs.forEach(spec => {
                const li = document.createElement('li');
                li.textContent = spec;
                specsList.appendChild(li);
            });
        }

        modal.style.display = 'flex';
        updateModalCarousel();
        stopAutoplay();
        clearTimeout(autoplayTimer);
    }


        function updateModalCarousel() {
            if (totalModalSlides === 0 || !modalCarouselTrack) return;

            const offset = -currentModalSlide * 100;
            modalCarouselTrack.style.transform = `translateX(${offset}%)`;

            document.querySelectorAll('.dot').forEach((dot, index) => {
                dot.classList.toggle('active', index === currentModalSlide);
            });
        }

        function moveToModalSlide(index) {
            currentModalSlide = index;
            updateModalCarousel();
        }

        document.getElementById('carousel-prev').addEventListener('click', () => {
            if (currentModalSlide > 0) {
                currentModalSlide--;
                updateModalCarousel();
            } else if (currentModalSlide === 0 && totalModalSlides > 1) {
                currentModalSlide = totalModalSlides - 1;
                updateModalCarousel();
            }
        });

        document.getElementById('carousel-next').addEventListener('click', () => {
            if (currentModalSlide < totalModalSlides - 1) {
                currentModalSlide++;
                updateModalCarousel();
            } else if (currentModalSlide === totalModalSlides - 1 && totalModalSlides > 1) {
                currentModalSlide = 0;
                updateModalCarousel();
            }
        });

        let modalTouchStartX = 0;
        let modalIsDragging = false;
        const modalSwipeThreshold = 50;

        document.addEventListener('DOMContentLoaded', () => {
            const container = document.querySelector('.carousel-container'); 

            if (container) {
                container.addEventListener('touchstart', (e) => {
                    modalIsDragging = true;
                    modalTouchStartX = e.touches[0].clientX;
                });

                container.addEventListener('touchmove', (e) => {
                });

                container.addEventListener('touchend', (e) => {
                    if (!modalIsDragging) return;
                    modalIsDragging = false;
                    
                    const touchEndX = e.changedTouches[0].clientX;
                    const diffX = modalTouchStartX - touchEndX;
                    
                    if (Math.abs(diffX) > modalSwipeThreshold) {
                        if (diffX > 0) {
                            document.getElementById('carousel-next').click();
                        } else {
                            document.getElementById('carousel-prev').click();
                        }
                    }
                });
            }
            
            if (galleries.main && galleries.main.subgalleries && galleries.main.subgalleries.length > 0) {
                buildCarousel(galleries.main.subgalleries[0]);
            }
        });


        prevButton.addEventListener('click', () => {
            if (prevButton.classList.contains('locked')) return;
            totalRotationAngle += anglePerSlide;
            currentSlideIndex = (currentSlideIndex - 1 + totalImages) % totalImages;
            updateCarousel();
            resetAutoplayTimer();
        });

        nextButton.addEventListener('click', () => {
            if (nextButton.classList.contains('locked')) return;
            totalRotationAngle -= anglePerSlide;
            currentSlideIndex = (currentSlideIndex + 1) % totalImages;
            updateCarousel();
            resetAutoplayTimer();
        });

        menuButton.addEventListener('click', () => {
            if (menuButton.classList.contains('locked')) return;
            updateMenu();
            mainMenu.classList.toggle('visible');
            resetAutoplayTimer();
        });

        mainMenu.addEventListener('click', (event) => {
            if (event.target.tagName === 'A' && !event.target.classList.contains('locked')) {
                event.preventDefault();
                const category = event.target.dataset.category;
                if (category) {
                    buildCarousel(category);
                }
                mainMenu.classList.remove('visible');
            }
        });

        selectButton.addEventListener('click', () => {
            if (selectButton.classList.contains('locked')) return;
            if (!slides || slides.length === 0) return;
            const frontImageIndex = (currentSlideIndex + Math.floor(totalImages / 2)) % totalImages;
            openModal(currentGalleryId, frontImageIndex);
        });

        closeButton.addEventListener('click', () => {
            modal.style.display = 'none';
            resetAutoplayTimer();
        });

        modal.addEventListener('click', (event) => {
            if (event.target === modal) {
                modal.style.display = 'none';
                resetAutoplayTimer();
            }
        });

        sliderContainer.addEventListener('touchstart', (e) => {
            if (isTransitioning) return;
            isDragging = true;
            startX = e.touches[0].clientX;
            movedX = 0;
            stopAutoplay();
        });

        sliderContainer.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            const currentX = e.touches[0].clientX;
            movedX = currentX - startX;
        });

        sliderContainer.addEventListener('touchend', () => {
            if (!isDragging) return;
            isDragging = false;

            if (movedX > swipeThreshold) {
                totalRotationAngle += anglePerSlide;
                currentSlideIndex = (currentSlideIndex - 1 + totalImages) % totalImages;
            } else if (movedX < -swipeThreshold) {
                totalRotationAngle -= anglePerSlide;
                currentSlideIndex = (currentSlideIndex + 1) % totalImages;
            }

            updateCarousel();
            resetAutoplayTimer();
        });

        slider.addEventListener('click', (event) => {
            const imgElement = event.target.closest('img');
            if (imgElement) {
                const itemIndex = parseInt(imgElement.dataset.index);
                openModal(currentGalleryId, itemIndex);
            }
        });
        window.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && (e.key === '=' || e.key === '-' || e.key === '+')) {
                e.preventDefault();
            }
        });
        window.addEventListener('wheel', (e) => {
            if (e.ctrlKey) {
                e.preventDefault();
            }
        }, { passive: false });

        window.addEventListener('contextmenu', (e) => {
            e.preventDefault();
        });

        document.addEventListener('touchstart', (event) => {
            if (event.touches.length > 1) {
                event.preventDefault();
            }
        }, { passive: false });

        document.addEventListener('gesturestart', (event) => {
            event.preventDefault();
        });
    </script>
</body>
</html>
